[colors.bright]
black = "#282828"
blue = "#95a99f"
cyan = "#96a6c8"
green = "#81b29a"
magenta = "#9e95c7"
red = "#dc6363"
white = "#e4e4ef"
yellow = "#d2b55b"

[colors.normal]
black = "#282828"
blue = "#95a99f"
cyan = "#96a6c8"
green = "#81b29a"
magenta = "#9e95c7"
red = "#dc6363"
white = "#e4e4ef"
yellow = "#d2b55b"

[colors.primary]
background = "#181818"
foreground = "#e4e4ef"

[env]
TERM = "xterm-256color"

[font]
size = 9.0

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "SemiBold"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[scrolling]
history = 100000

[window]
opacity = 1.0
decorations = "none"

[window.padding]
x = 15
y = 5

[[keyboard.bindings]]
  key = "U"
  mods = "Control"
  action = "Paste"
