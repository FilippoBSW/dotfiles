monitor = DP-1, preferred, 3200x0, 1.2
monitor = DP-3, preferred, 0x0, 1.2, transform, 3
monitor = DP-2, preferred, 6400x0, 1.2, transform, 1

exec-once = hypridle
exec-once = hyprpaper
exec-once = waybar
exec-once = blueman-applet
exec-once = nm-applet
exec-once = /usr/libexec/kf6/polkit-kde-authentication-agent-1
exec-once = [workspace 1 silent] emacs
exec-once = [workspace 2 silent] alacritty
exec-once = [workspace 3 silent] firefox

$mainMod = SUPER

env = XCCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

xwayland {
  force_zero_scaling = true
}

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(a9b665ee) rgba(7c6f64ee) 45deg
    col.inactive_border = rgba(665c54aa)
    layout = dwindle
    allow_tearing = false
}

misc {
 mouse_move_enables_dpms = true
}

cursor {
  no_hardware_cursors = true
}

decoration {
    rounding = 0

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
    shadow {
        enabled = false
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, quick
    animation = border, 1, 5.39, quick
    animation = windows, 1, 4.79, quick
    animation = windowsIn, 1, 4.1, quick
    animation = windowsOut, 1, 1.49, quick
    animation = fadeIn, 1, 1.73, quick
    animation = fadeOut, 1, 1.46, quick
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, quick
    animation = layersIn, 1, 4, easeOutQuint, quick
    animation = layersOut, 1, 1.5, linear, quick
    animation = fadeLayersIn, 1, 1.79, quick
    animation = fadeLayersOut, 1, 1.39, quick
    animation = workspaces, 1, 1.94, quick
}

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    new_on_top = true
    new_status = master
}

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0
}

gestures {
    workspace_swipe = on
}

device {
    name = at-translated-set-2-keyboard
    kb_layout = us, us
    kb_variant = colemak_dh,
    kb_options = caps:swapescape
}
bind = $mainMod, SPACE, exec, hyprctl switchxkblayout at-translated-set-2-keyboard next

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# no gaps on single window
workspace = w[t1], gapsout:0, gapsin:0
workspace = w[tg1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
windowrulev2 = bordersize 0, floating:0, onworkspace:w[t1]
windowrulev2 = rounding 0, floating:0, onworkspace:w[t1]
windowrulev2 = bordersize 0, floating:0, onworkspace:w[tg1]
windowrulev2 = rounding 0, floating:0, onworkspace:w[tg1]
windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

layerrule = noanim, ^(menu)$

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

bind = $mainMod, o, focusmonitor, DP-1
bind = $mainMod, f, focusmonitor, DP-3
bind = $mainMod, u, focusmonitor, DP-2

bind = $mainMod, a, cyclenext
bind = $mainMod, e, cyclenext, prev

bind = $mainMod SHIFT, a, swapnext
bind = $mainMod SHIFT, e, swapnext, prev

bind = $mainMod, j, togglesplit

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod, n, exec, ~/.config/hypr/smart_workspace.sh 1
bind = $mainMod, r, exec, ~/.config/hypr/smart_workspace.sh 2
bind = $mainMod, t, exec, ~/.config/hypr/smart_workspace.sh 3
bind = $mainMod, s, exec, ~/.config/hypr/smart_workspace.sh 4
bind = $mainMod, g, exec, ~/.config/hypr/smart_workspace.sh 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

bind = $mainMod SHIFT, n, movetoworkspace, 1
bind = $mainMod SHIFT, r, movetoworkspace, 2
bind = $mainMod SHIFT, t, movetoworkspace, 3
bind = $mainMod SHIFT, s, movetoworkspace, 4
bind = $mainMod SHIFT, g, movetoworkspace, 5

bind = $mainMod SHIFT, q, exit,
bind = $mainMod, l, exec, hyprlock
bind = $mainMod SHIFT, c, killactive,
bind = $mainMod, c, exec, ~/.config/hypr/rofi.sh
bind = $mainMod SHIFT, z, exec, ~/.config/hypr/toggle_side_monitors.sh

bind = $mainMod, RETURN, exec, alacritty

bind = $mainMod, x, togglefloating,
bind = $mainMod, w, fullscreen, 0
bind = $mainMod, m, fullscreen, 1

bind = $mainMod, b, exec, killall -SIGUSR1 waybar

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
