[colors]
background = #282A2E
foreground = #C5C8C6

[bar/mybar]
width = 100%
height = 27
enable-ipc = true
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

tray-position = right
tray-padding = 2
tray-maxsize = 20
tray-scale = 1.0
tray-background = ${colors.background}

padding-right = 2
module-margin = 1

font-0 = "DejaVu Sans:size=10;2"
font-1 = "Font Awesome 6 Free:style=Solid:size=10;2"

modules-left = xwindow
modules-center = date
modules-right =

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d%
time = %H:%M
label = %date% %time%

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%